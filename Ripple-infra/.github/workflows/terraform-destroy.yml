name: Terraform Destroy


on:
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        description: "Branch name to checkout"
        required: true
        default: "main"
        options:
          - main
          - feature
      environment:
        type: choice
        description: "Environment name"
        required: true
        default: "dev"
        options:
          - dev
          - pre
          - prd

jobs:
  destroy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (dev)
        run: |
          cd Ripple-infra/terraform/environments/dev
          terraform init -input=false
      - name: Terraform Destroy (dev)
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          cd Ripple-infra/terraform/environments/dev
          terraform destroy -auto-approve

  destroy-pre:
    if: ${{ github.event.inputs.environment == 'pre' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (pre)
        run: |
          cd Ripple-infra/terraform/environments/pre
          terraform init -input=false
      - name: Terraform Destroy (pre)
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          cd Ripple-infra/terraform/environments/pre
          terraform destroy -auto-approve

  destroy-prd:
    if: ${{ github.event.inputs.environment == 'prd' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (prd)
        run: |
          cd Ripple-infra/terraform/environments/prd
          terraform init -input=false
      - name: Terraform Destroy (prd)
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
        run: |
          cd Ripple-infra/terraform/environments/prd
          terraform destroy -auto-approve
