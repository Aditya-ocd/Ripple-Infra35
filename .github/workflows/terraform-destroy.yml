name: Terraform Destroy


on:
  workflow_dispatch:
    inputs:
      branch:
        type: choice
        description: "Branch name to checkout"
        required: true
        default: "main"
        options:
          - main
          - feature1
      environment:
        type: choice
        description: "Environment name"
        required: true
        default: "dev"
        options:
          - dev
          - pre
          - prd
          

permissions:
  id-token: write
  contents: read         

jobs:
  destroy-dev:
    if: ${{ github.event.inputs.environment == 'dev' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (dev)
        run: |
          cd Ripple-infra/terraform/environments/dev
          terraform init -input=false
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false
      - name: Terraform Destroy (dev)
        run: |
          cd Ripple-infra/terraform/environments/dev
          terraform destroy -auto-approve

  destroy-pre:
    if: ${{ github.event.inputs.environment == 'pre' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (pre)
        run: |
          cd Ripple-infra/terraform/environments/pre
          terraform init -input=false
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false
      - name: Terraform Destroy (pre)
        run: |
          cd Ripple-infra/terraform/environments/pre
          terraform destroy -auto-approve

  destroy-prd:
    if: ${{ github.event.inputs.environment == 'prd' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.inputs.branch }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
      - name: Terraform Init (prd)
        run: |
          cd Ripple-infra/terraform/environments/prd
          terraform init -input=false
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false
      - name: Terraform Destroy (prd)
        run: |
          cd Ripple-infra/terraform/environments/prd
          terraform destroy -auto-approve
